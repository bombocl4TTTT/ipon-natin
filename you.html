<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipon — You</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a18;
    --muted: #9a9890;
    --accent: #1a1a18;
    --tag: #e8e6e1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 24px 60px;
    max-width: 400px;
    margin: 0 auto;
  }

  /* Staggered load animation */
  .fade-in { opacity: 0; transform: translateY(12px); animation: fadeUp 0.5s ease forwards; }
  .fade-in:nth-child(1) { animation-delay: 0.05s; }
  .fade-in:nth-child(2) { animation-delay: 0.12s; }
  .fade-in:nth-child(3) { animation-delay: 0.19s; }
  .fade-in:nth-child(4) { animation-delay: 0.26s; }
  .fade-in:nth-child(5) { animation-delay: 0.33s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    margin-bottom: 40px;
  }

  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }

  .header-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.2s;
    cursor: pointer;
  }

  .header-link:hover { color: var(--text); }

  /* Total block */
  .total-block {
    border-top: 1.5px solid var(--text);
    padding-top: 20px;
    margin-bottom: 32px;
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .total-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .total-number {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }



  /* Split row */
  .split-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .split-cell {
    background: var(--surface);
    padding: 16px 14px;
  }

  .split-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .split-amount {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
  }

  .split-streak {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Deposit button */
  .deposit-btn {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    padding: 14px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .deposit-btn:active { opacity: 0.75; }

  /* History */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--border);
  }

  .history-row {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    animation: fadeUp 0.3s ease forwards;
  }

  .history-who {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    width: 60px;
    color: var(--muted);
  }

  .history-who.me { color: var(--text); font-weight: 500; }

  .history-date {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    flex: 1;
  }

  .history-amt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .empty {
    padding: 28px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* Delete button */
  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    transition: color 0.2s;
  }

  .delete-btn:hover { color: var(--text); }

  /* Amount input */
  .amount-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }

  .amount-input {
    width: 60px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    background: var(--surface);
    color: var(--text);
  }

  .amount-input:focus {
    outline: none;
    border-color: var(--text);
  }

  .amount-input-row .deposit-btn {
    flex: 1;
  }

  /* Milestone celebration */
  .milestone-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }

  .milestone-box {
    background: var(--surface);
    padding: 40px 30px;
    border-radius: 8px;
    text-align: center;
    animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  .milestone-emoji {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  .milestone-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .milestone-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { opacity: 1; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* Header icon */
  .header-icon {
    position: absolute;
    top: 40px;
    right: 24px;
    background: none;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 24px;
    height: 24px;
    padding: 0;
  }

  .header-icon img {
    width: 100%;
    height: 100%;
  }

  /* Analytics modal */
  .analytics-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.2);
    display: none;
    align-items: flex-end;
    z-index: 999;
  }

  .analytics-modal.show { display: flex; }

  .analytics-sheet {
    background: var(--surface);
    width: 100%;
    border-radius: 8px 8px 0 0;
    padding: 28px 24px 40px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .analytics-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .analytics-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .analytics-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted);
  }

  .analytics-section {
    margin-bottom: 28px;
  }

  .analytics-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .analytics-content {
    background: var(--tag);
    border-radius: 2px;
    padding: 12px;
  }

  .analytics-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 0.85rem;
  }

  .analytics-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 10px 20px;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* GF page link */
  .gf-link {
    display: block;
    text-align: center;
    margin-top: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .gf-link:hover { color: var(--text); }
</style>
</head>
<body>

<div class="fade-in">
  <div class="header">
    <div class="header-label">Ipon Tracker · Red's Page</div>
    <div class="header-title">Daily<br>Savings.</div>
    <span class="header-link" onclick="window.location='gf.html'">Switch to Bebe's page →</span>
    <button class="header-icon" onclick="toggleAnalytics()"><img src="graph_icon.png" alt="Analytics"></button>
  </div>
</div>

<div class="fade-in">
  <div class="total-block">
    <div class="total-label">Combined Total</div>
    <div class="total-row">
      <div class="total-number" id="total">₱0</div>
    </div>
  </div>
</div>

<div class="fade-in">
  <div class="split-row">
    <div class="split-cell">
      <div class="split-label">Red</div>
      <div class="split-amount" id="you-amt">₱0</div>
      <div class="split-streak" id="you-streak">0 day streak</div>
    </div>
    <div class="split-cell">
      <div class="split-label">Bebe</div>
      <div class="split-amount" id="gf-amt">₱0</div>
      <div class="split-streak" id="gf-streak">0 day streak</div>
    </div>
  </div>
</div>

<div class="fade-in">
  <div class="amount-input-row">
    <input type="number" class="amount-input" id="deposit-amt" placeholder="₱" value="20" min="1">
    <button class="deposit-btn" onclick="deposit('you')">
      <span>+ ₱₱₱ — Save Today</span>
      <span>→</span>
    </button>
  </div>
</div>

<div class="fade-in" style="margin-top: 32px;">
  <div class="section-label">
    <span>Deposit Log</span>
    <span id="log-count">0 entries</span>
  </div>
  <div class="history-list" id="history"></div>
</div>

<a class="gf-link" href="gf.html">Go to Bebe's page ↗</a>

<div class="toast" id="toast"></div>

<div class="analytics-modal" id="analyticsModal">
  <div class="analytics-sheet">
    <div class="analytics-header">
      <div class="analytics-title">Analytics</div>
      <button class="analytics-close" onclick="toggleAnalytics()">✕</button>
    </div>
    
    <div class="analytics-section">
      <div class="analytics-label">Monthly Breakdown</div>
      <div class="analytics-content" id="monthlyBreakdown"></div>
    </div>

    <div class="analytics-section">
      <div class="analytics-label">Savings Rate</div>
      <div class="analytics-content" id="savingsRate"></div>
    </div>

    <div class="analytics-section">
      <div class="analytics-label">Contribution</div>
      <div class="analytics-content" id="contribution"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://smgcsfzhdkiekvymicbi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_b0wrq_pp4_lf-eM0r1XQUA_u5_HVjbt'; 
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 

  async function deposit(who) {
    try {
      const amt = parseInt(document.getElementById('deposit-amt').value) || 20;
      await db.from('deposits').insert({ person: who, amount: amt });
      document.getElementById('deposit-amt').value = '20';
      await loadAndRender();
      showToast(who === 'you' ? `₱${amt} saved.` : `₱${amt} saved for Bebe.`);
    } catch (err) {
      console.error('Deposit failed:', err);
      showToast('Error saving deposit. Try again.');
    }
  }

  async function deleteDeposit(id) {
    if (!confirm('Sure ka e-delete mo???')) return;
    try {
      const { error } = await db.from('deposits').delete().eq('id', id);
      if (error) {
        console.error('Delete error:', error);
        showToast('Error deleting entry. Check console.');
        return;
      }
      await new Promise(resolve => setTimeout(resolve, 300));
      await loadAndRender();
      showToast('Entry deleted.');
    } catch (err) {
      console.error('Delete failed:', err);
      showToast('Error deleting entry.');
    }
  }

  let lastMilestone = 0;
  function checkMilestone(total) {
    const milestones = [250, 500, 750, 1000, 2000, 3000, 5000, 7000, 8000, 10000];
    for (let m of milestones) {
      if (total >= m && lastMilestone < m) {
        lastMilestone = m;
        showMilestone(m);
        return;
      }
    }
  }

  function showMilestone(amount) {
    const overlay = document.createElement('div');
    overlay.className = 'milestone-overlay';
    overlay.innerHTML = `
      <div class="milestone-box">
        <div class="milestone-emoji">🎉</div>
        <div class="milestone-text">₱${amount.toLocaleString()}!</div>
        <div class="milestone-sub">Milestone reached — Keep it up!</div>
      </div>
    `;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3000);
  }

  async function loadAndRender() {
    try {
      const { data, error } = await db.from('deposits').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      
      const you = data.filter(d => d.person === 'you');
      const gf = data.filter(d => d.person === 'gf');
      const state = {
        you: { total: you.reduce((s, d) => s + d.amount, 0), streak: calculateStreak(you) },
        gf: { total: gf.reduce((s, d) => s + d.amount, 0), streak: calculateStreak(gf) },
        history: data.slice(0, 30)
      };
      render(state);
    } catch (err) {
      console.error('Load failed:', err);
      render({ you: { total: 0, streak: 0 }, gf: { total: 0, streak: 0 }, history: [] });
    }
  }

  function calculateStreak(rows) {
    if (!rows.length) return 0;
    let count = 1, prev = new Date(rows[0].created_at).toDateString();
    for (let i = 1; i < rows.length; i++) {
      const d = new Date(rows[i].created_at);
      d.setDate(d.getDate() + 1);
      if (d.toDateString() === prev) {
        count++;
        prev = new Date(rows[i].created_at).toDateString();
      } else break;
    }
    return count;
  }

  loadAndRender();

  function render(state) {
    const total = state.you.total + state.gf.total;

    document.getElementById('total').textContent = '₱' + total.toLocaleString();

    document.getElementById('you-amt').textContent = '₱' + state.you.total.toLocaleString();
    document.getElementById('gf-amt').textContent = '₱' + state.gf.total.toLocaleString();
    document.getElementById('you-streak').textContent = state.you.streak + ' day streak';
    document.getElementById('gf-streak').textContent = state.gf.streak + ' day streak';

    document.getElementById('log-count').textContent = state.history.length + ' entries';

    checkMilestone(total);
    updateAnalytics(state);

    const hist = document.getElementById('history');
    if (!state.history.length) {
      hist.innerHTML = '<div class="empty">No entries yet.</div>';
      return;
    }

    hist.innerHTML = state.history.map(h => {
      const date = new Date(h.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      return `
        <div class="history-row">
          <div class="history-who ${h.person === 'you' ? 'me' : ''}">${h.person === 'you' ? 'Red' : 'Bebe'}</div>
          <div class="history-date">${date}</div>
          <div class="history-amt">+₱${h.amount}</div>
          <button type="button" class="delete-btn" data-id="${h.id}">✕</button>
        </div>
      `;
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function setupDeleteButtons() {
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('delete-btn')) {
        e.preventDefault();
        e.stopPropagation();
        const id = e.target.getAttribute('data-id');
        if (id) deleteDeposit(parseInt(id));
      }
    });
  }

  setupDeleteButtons();

  function toggleAnalytics() {
    document.getElementById('analyticsModal').classList.toggle('show');
  }

  function updateAnalytics(state) {
    // Monthly breakdown
    const months = {};
    state.history.forEach(h => {
      const monthKey = new Date(h.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
      months[monthKey] = (months[monthKey] || 0) + h.amount;
    });

    let monthlyHTML = '';
    Object.entries(months).reverse().forEach(([month, amount]) => {
      monthlyHTML += `
        <div class="analytics-row">
          <span>${month}</span>
          <span class="analytics-value">₱${amount.toLocaleString()}</span>
        </div>
      `;
    });
    document.getElementById('monthlyBreakdown').innerHTML = monthlyHTML || '<div style="padding: 8px; color: var(--muted);">No data</div>';

    // Actual savings for today/week/month
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weekAgo = new Date(today);
    weekAgo.setDate(weekAgo.getDate() - 7);
    const monthAgo = new Date(today);
    monthAgo.setMonth(monthAgo.getMonth() - 1);

    let savedToday = 0;
    let savedWeek = 0;
    let savedMonth = 0;
    let savedTodayByYou = 0;
    let savedTodayByGf = 0;

    state.history.forEach(h => {
      const hDate = new Date(h.created_at);
      const hDay = new Date(hDate.getFullYear(), hDate.getMonth(), hDate.getDate());
      
      if (hDay.getTime() === today.getTime()) {
        savedToday += h.amount;
        if (h.person === 'you') savedTodayByYou += h.amount;
        else savedTodayByGf += h.amount;
      }
      if (hDate >= weekAgo) savedWeek += h.amount;
      if (hDate >= monthAgo) savedMonth += h.amount;
    });

    const missedToday = savedTodayByYou === 0 ? '<div style="color: var(--accent); font-size: 0.75rem; margin-top: 8px;">💭 You haven\'t saved today yet</div>' : '';

    document.getElementById('savingsRate').innerHTML = `
      <div class="analytics-row">
        <span>Saved today</span>
        <span class="analytics-value">₱${savedToday.toLocaleString()}</span>
      </div>
      <div class="analytics-row">
        <span>Saved this week</span>
        <span class="analytics-value">₱${savedWeek.toLocaleString()}</span>
      </div>
      <div class="analytics-row">
        <span>Saved this month</span>
        <span class="analytics-value">₱${savedMonth.toLocaleString()}</span>
      </div>
      ${missedToday}
    `;

    // Contribution percentage
    const total = state.you.total + state.gf.total;
    const youPercent = total > 0 ? ((state.you.total / total) * 100).toFixed(1) : 0;
    const gfPercent = total > 0 ? ((state.gf.total / total) * 100).toFixed(1) : 0;

    document.getElementById('contribution').innerHTML = `
      <div class="analytics-row">
        <span>Red</span>
        <span class="analytics-value">${youPercent}%</span>
      </div>
      <div class="analytics-row">
        <span>Bebe</span>
        <span class="analytics-value">${gfPercent}%</span>
      </div>
    `;
  }
</script>
</body>
</html>
