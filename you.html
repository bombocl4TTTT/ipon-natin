<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipon — You</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a18;
    --muted: #9a9890;
    --accent: #1a1a18;
    --tag: #e8e6e1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 24px 60px;
    max-width: 400px;
    margin: 0 auto;
  }

  /* Staggered load animation */
  .fade-in { opacity: 0; transform: translateY(12px); animation: fadeUp 0.5s ease forwards; }
  .fade-in:nth-child(1) { animation-delay: 0.05s; }
  .fade-in:nth-child(2) { animation-delay: 0.12s; }
  .fade-in:nth-child(3) { animation-delay: 0.19s; }
  .fade-in:nth-child(4) { animation-delay: 0.26s; }
  .fade-in:nth-child(5) { animation-delay: 0.33s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    margin-bottom: 40px;
  }

  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }

  .header-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.2s;
    cursor: pointer;
  }

  .header-link:hover { color: var(--text); }

  /* Total block */
  .total-block {
    border-top: 1.5px solid var(--text);
    padding-top: 20px;
    margin-bottom: 32px;
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .total-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .total-number {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .total-goal {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Progress */
  .progress-wrap {
    margin-top: 16px;
    height: 2px;
    background: var(--border);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--text);
    transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Split row */
  .split-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .split-cell {
    background: var(--surface);
    padding: 16px 14px;
  }

  .split-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .split-amount {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
  }

  .split-streak {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Deposit button */
  .deposit-btn {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    padding: 18px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .deposit-btn:active { opacity: 0.75; }

  .deposit-btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* History */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--border);
  }

  .history-row {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    animation: fadeUp 0.3s ease forwards;
  }

  .history-who {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    width: 60px;
    color: var(--muted);
  }

  .history-who.me { color: var(--text); font-weight: 500; }

  .history-date {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    flex: 1;
  }

  .history-amt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .empty {
    padding: 28px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 10px 20px;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* GF page link */
  .gf-link {
    display: block;
    text-align: center;
    margin-top: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .gf-link:hover { color: var(--text); }
</style>
</head>
<body>

<div class="fade-in">
  <div class="header">
    <div class="header-label">Ipon Tracker · Your Page</div>
    <div class="header-title">Daily<br>Savings.</div>
    <span class="header-link" onclick="window.location='gf.html'">Switch to GF's page →</span>
  </div>
</div>

<div class="fade-in">
  <div class="total-block">
    <div class="total-label">Combined Total</div>
    <div class="total-row">
      <div class="total-number" id="total">₱0</div>
    </div>
    <div class="total-goal" id="goal-text">₱0 of ₱5,000 goal</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="fade-in">
  <div class="split-row">
    <div class="split-cell">
      <div class="split-label">You</div>
      <div class="split-amount" id="you-amt">₱0</div>
      <div class="split-streak" id="you-streak">0 day streak</div>
    </div>
    <div class="split-cell">
      <div class="split-label">GF</div>
      <div class="split-amount" id="gf-amt">₱0</div>
      <div class="split-streak" id="gf-streak">0 day streak</div>
    </div>
  </div>
</div>

<div class="fade-in">
  <button class="deposit-btn" onclick="deposit('you')">
    <span>+ ₱20 — Save Today</span>
    <span>→</span>
  </button>
</div>

<div class="fade-in" style="margin-top: 32px;">
  <div class="section-label">
    <span>Deposit Log</span>
    <span id="log-count">0 entries</span>
  </div>
  <div class="history-list" id="history"></div>
</div>

<a class="gf-link" href="gf.html">Go to GF's page ↗</a>

<div class="toast" id="toast"></div>

<script>
  const GOAL = 5000;
  const SUPABASE_URL = 'smgcsfzhdkiekvymicbi'; 
  const SUPABASE_KEY = 'sb_publishable_b0wrq_pp4_lf-eM0r1XQUA_u5_HVjbt'; 
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 

  async function deposit(who) {
    try {
      await db.from('deposits').insert({ person: who, amount: 20 });
      await loadAndRender();
      showToast(who === 'you' ? '₱20 saved.' : '₱20 saved for GF.');
    } catch (err) {
      console.error('Deposit failed:', err);
      showToast('Error saving deposit. Try again.');
    }
  }

  async function loadAndRender() {
    try {
      const { data, error } = await db.from('deposits').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      
      const you = data.filter(d => d.person === 'you');
      const gf = data.filter(d => d.person === 'gf');
      const state = {
        you: { total: you.reduce((s, d) => s + d.amount, 0), streak: calculateStreak(you) },
        gf: { total: gf.reduce((s, d) => s + d.amount, 0), streak: calculateStreak(gf) },
        history: data.slice(0, 30)
      };
      render(state);
    } catch (err) {
      console.error('Load failed:', err);
      render({ you: { total: 0, streak: 0 }, gf: { total: 0, streak: 0 }, history: [] });
    }
  }

  function calculateStreak(rows) {
    if (!rows.length) return 0;
    let count = 1, prev = new Date(rows[0].created_at).toDateString();
    for (let i = 1; i < rows.length; i++) {
      const d = new Date(rows[i].created_at);
      d.setDate(d.getDate() + 1);
      if (d.toDateString() === prev) {
        count++;
        prev = new Date(rows[i].created_at).toDateString();
      } else break;
    }
    return count;
  }

  loadAndRender();

  function render(state) {
    const total = state.you.total + state.gf.total;
    const pct = Math.min((total / GOAL) * 100, 100);

    document.getElementById('total').textContent = '₱' + total.toLocaleString();
    document.getElementById('goal-text').textContent = `₱${total.toLocaleString()} of ₱${GOAL.toLocaleString()} goal`;
    document.getElementById('progress').style.width = pct + '%';

    document.getElementById('you-amt').textContent = '₱' + state.you.total.toLocaleString();
    document.getElementById('gf-amt').textContent = '₱' + state.gf.total.toLocaleString();
    document.getElementById('you-streak').textContent = state.you.streak + ' day streak';
    document.getElementById('gf-streak').textContent = state.gf.streak + ' day streak';

    document.getElementById('log-count').textContent = state.history.length + ' entries';

    const hist = document.getElementById('history');
    if (!state.history.length) {
      hist.innerHTML = '<div class="empty">No entries yet.</div>';
      return;
    }

    hist.innerHTML = state.history.map(h => `
      <div class="history-row">
        <div class="history-who ${h.who === 'you' ? 'me' : ''}">${h.who === 'you' ? 'You' : 'GF'}</div>
        <div class="history-date">${h.time}</div>
        <div class="history-amt">+₱20</div>
      </div>
    `).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
