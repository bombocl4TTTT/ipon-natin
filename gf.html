<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipon — GF</title>
<link rel="manifest" href="manifest-gf.json">
<link rel="apple-touch-icon" href="icon.jpg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --border: #ece8e1;
    --text: #2c2825;
    --muted: #b0a898;
    --soft: #f0ece5;
    --accent: #c4956a;
    --accent-light: #f5ede3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    height: 100vh;
    overflow: hidden;
    padding: 0;
    max-width: 100%;
    margin: 0;
    display: flex;
    flex-direction: column;
  }

  .page-wrapper {
    padding: 48px 28px 60px;
    max-width: 400px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .fade { opacity: 0; transform: translateY(10px); animation: up 0.55s ease forwards; }
  .fade:nth-child(1) { animation-delay: 0.05s; }
  .fade:nth-child(2) { animation-delay: 0.13s; }
  .fade:nth-child(3) { animation-delay: 0.21s; }
  .fade:nth-child(4) { animation-delay: 0.29s; }
  .fade:nth-child(5) { animation-delay: 0.37s; }

  @keyframes up { to { opacity: 1; transform: translateY(0); } }

  /* Header */
  .header { margin-bottom: 44px; }

  .header-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2.6rem;
    line-height: 1.15;
    color: var(--text);
  }

  .header-title em {
    font-style: italic;
    color: var(--accent);
  }

  .header-switch {
    display: inline-block;
    margin-top: 12px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.2s;
  }

  .header-switch:hover { color: var(--accent); }

  /* Total */
  .total-card {
    background: var(--accent-light);
    border-radius: 24px;
    padding: 28px 24px 22px;
    margin-bottom: 16px;
  }

  .total-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    opacity: 0.8;
  }

  .total-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.4rem;
    font-weight: 600;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .total-sub {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
  }



  /* Person pills */
  .pills {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px 18px;
  }

  .pill-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .pill-amt {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 600;
    line-height: 1;
    color: var(--text);
  }

  .pill-streak {
    font-size: 0.67rem;
    color: var(--muted);
    margin-top: 3px;
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 12px 20px;
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:active { transform: scale(0.98); opacity: 0.88; }


  /* History */
  .section-head {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .see-all-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
  }

  .see-all-btn:hover { color: var(--text); }

  .log {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: up 0.3s ease forwards;
  }

  .log-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--accent);
    opacity: 0.4;
  }

  .log-dot.me { opacity: 1; }

  .log-who {
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--text);
    width: 38px;
  }

  .log-time {
    font-size: 0.75rem;
    color: var(--muted);
    flex: 1;
  }

  .log-amt {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
  }

  .empty-log {
    text-align: center;
    padding: 28px;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: var(--bg);
    font-family: 'Lato', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    padding: 11px 22px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .you-link {
    display: block;
    text-align: center;
    margin-top: 36px;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .you-link:hover { color: var(--text); }

  /* Delete button */
  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0;
    transition: color 0.2s;
  }

  .delete-btn:hover { color: var(--text); }

  /* Amount input */
  .amount-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 20px;
  }

  .amount-input {
    width: 60px;
    padding: 12px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    background: var(--surface);
    color: var(--text);
    height: 46px;
    display: flex;
    align-items: center;
  }

  .amount-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .amount-input-row .btn-primary {
    flex: 1;
    margin-bottom: 0;
  }

  /* Milestone celebration */
  .milestone-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }

  .milestone-box {
    background: var(--surface);
    padding: 40px 30px;
    border-radius: 20px;
    text-align: center;
    animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  .milestone-emoji {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  .milestone-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .milestone-sub {
    font-size: 0.75rem;
    color: var(--muted);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { opacity: 1; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* All deposits modal */
  .all-deposits-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.2);
    display: none;
    align-items: flex-end;
    z-index: 999;
  }

  .all-deposits-modal.show { display: flex; }

  .all-deposits-sheet {
    background: var(--surface);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 32px 28px 40px;
    animation: slideUp 0.3s ease;
    max-height: 80vh;
    overflow-y: auto;
  }

  .all-deposits-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .all-deposits-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
  }

  .all-deposits-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted);
  }

  /* Header icon */
  .header-icon {
    position: absolute;
    top: 48px;
    right: 28px;
    background: none;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 24px;
    height: 24px;
    padding: 0;
  }

  .header-icon img {
    width: 100%;
    height: 100%;
  }

  /* Analytics modal */
  .analytics-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.2);
    display: none;
    align-items: flex-end;
    z-index: 999;
  }

  .analytics-modal.show { display: flex; }

  .analytics-sheet {
    background: var(--surface);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 32px 28px 40px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .analytics-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .analytics-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
  }

  .analytics-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted);
  }

  .analytics-section {
    margin-bottom: 28px;
  }

  .analytics-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .analytics-content {
    background: var(--bg);
    border-radius: 16px;
    padding: 16px;
  }

  .analytics-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    font-size: 0.9rem;
  }

  .analytics-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="page-wrapper">

<div class="fade">
  <div class="header">
    <div class="header-eyebrow">Ipon Tracker · Bebe's Page</div>
    <div class="header-title">Our Gamay<br><em>nga savings.</em></div>
    <span class="header-switch" onclick="window.location='you.html'">Switch to Red's page →</span>
    <button class="header-icon" onclick="toggleAnalytics()"><img src="graph_icon.png" alt="Analytics"></button>
  </div>
</div>

<div class="fade">
  <div class="total-card">
    <div class="total-eyebrow">Combined Total</div>
    <div class="total-amount" id="total">₱0</div>
  </div>
</div>

<div class="fade">
  <div class="pills">
    <div class="pill">
      <div class="pill-label">Bebe 🌸</div>
      <div class="pill-amt" id="gf-amt">₱0</div>
      <div class="pill-streak" id="gf-streak">0 day streak</div>
    </div>
    <div class="pill">
      <div class="pill-label">Red 🧑</div>
      <div class="pill-amt" id="you-amt">₱0</div>
      <div class="pill-streak" id="you-streak">0 day streak</div>
    </div>
  </div>
</div>

<div class="fade">
  <div class="amount-input-row">
    <input type="number" class="amount-input" id="deposit-amt" placeholder="₱" value="20" min="1">
    <button class="btn-primary" onclick="deposit('gf')">
      ✦ Deposit today ✦
    </button>
  </div>
</div>

<div class="fade" style="margin-top: 32px; flex: 1; display: flex; flex-direction: column;">
  <div class="section-head">
    <span>Log</span>
    <button class="see-all-btn" onclick="toggleAllDeposits()">See All</button>
  </div>
  <div class="log" id="log"></div>
</div>

<a class="you-link" href="you.html">Go to Red's page ↗</a>

<div class="toast" id="toast"></div>

<div class="analytics-modal" id="analyticsModal">
  <div class="analytics-sheet">
    <div class="analytics-header">
      <div class="analytics-title">Analytics</div>
      <button class="analytics-close" onclick="toggleAnalytics()">✕</button>
    </div>
    
    <div class="analytics-section">
      <div class="analytics-label">Monthly Breakdown</div>
      <div class="analytics-content" id="monthlyBreakdown"></div>
    </div>

    <div class="analytics-section">
      <div class="analytics-label">Savings Rate</div>
      <div class="analytics-content" id="savingsRate"></div>
    </div>

    <div class="analytics-section">
      <div class="analytics-label">Contribution</div>
      <div class="analytics-content" id="contribution"></div>
    </div>
  </div>
</div>

</div><!-- Close page-wrapper -->

<div class="all-deposits-modal" id="allDepositsModal">
  <div class="all-deposits-sheet">
    <div class="all-deposits-header">
      <div class="all-deposits-title">All Deposits</div>
      <button class="all-deposits-close" onclick="toggleAllDeposits()">✕</button>
    </div>
    <div class="log" id="allDepositsList"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://smgcsfzhdkiekvymicbi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_b0wrq_pp4_lf-eM0r1XQUA_u5_HVjbt'; 
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 

  async function deposit(who) {
    try {
      const amt = parseInt(document.getElementById('deposit-amt').value) || 20;
      await db.from('deposits').insert({ person: who, amount: amt });
      document.getElementById('deposit-amt').value = '20';
      await loadAndRender();
      showToast(who === 'gf' ? `₱${amt} saved ✦` : `₱${amt} saved for Red ♡`);
    } catch (err) {
      console.error('Deposit failed:', err);
      showToast('Error saving deposit. Try again.');
    }
  }

  async function deleteDeposit(id) {
    if (!confirm('Sure ka e-delete mo???')) return;
    try {
      const { error } = await db.from('deposits').delete().eq('id', id);
      if (error) {
        console.error('Delete error:', error);
        showToast('Error deleting entry. Check console.');
        return;
      }
      await new Promise(resolve => setTimeout(resolve, 300));
      await loadAndRender();
      showToast('Entry deleted.');
    } catch (err) {
      console.error('Delete failed:', err);
      showToast('Error deleting entry.');
    }
  }

  let lastMilestone = 0;
  function checkMilestone(total) {
    const milestones = [250, 500, 750, 1000, 2000, 3000, 5000, 7000, 8000, 10000];
    for (let m of milestones) {
      if (total >= m && lastMilestone < m) {
        lastMilestone = m;
        showMilestone(m);
        return;
      }
    }
  }

  function showMilestone(amount) {
    const overlay = document.createElement('div');
    overlay.className = 'milestone-overlay';
    overlay.innerHTML = `
      <div class="milestone-box">
        <div class="milestone-emoji">🎉</div>
        <div class="milestone-text">₱${amount.toLocaleString()}!</div>
        <div class="milestone-sub">Milestone reached — Keep it up!</div>
      </div>
    `;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3000);
  }

  async function loadAndRender() {
    try {
      const { data, error } = await db.from('deposits').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      
      const you = data.filter(d => d.person === 'you');
      const gf = data.filter(d => d.person === 'gf');
      const state = {
        you: { total: you.reduce((s, d) => s + d.amount, 0), streak: calculateStreak(you) },
        gf: { total: gf.reduce((s, d) => s + d.amount, 0), streak: calculateStreak(gf) },
        history: data.slice(0, 30)
      };
      render(state);
    } catch (err) {
      console.error('Load failed:', err);
      render({ you: { total: 0, streak: 0 }, gf: { total: 0, streak: 0 }, history: [] });
    }
  }

  function calculateStreak(rows) {
    if (!rows.length) return 0;
    let count = 1, prev = new Date(rows[0].created_at).toDateString();
    for (let i = 1; i < rows.length; i++) {
      const d = new Date(rows[i].created_at);
      d.setDate(d.getDate() + 1);
      if (d.toDateString() === prev) {
        count++;
        prev = new Date(rows[i].created_at).toDateString();
      } else break;
    }
    return count;
  }

  loadAndRender();

  // Real-time listener for deposits
  db.channel('deposits-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'deposits' }, (payload) => {
      loadAndRender();
    })
    .subscribe();

  function render(state) {
    const total = state.you.total + state.gf.total;

    document.getElementById('total').textContent = '₱' + total.toLocaleString();

    document.getElementById('gf-amt').textContent = '₱' + state.gf.total.toLocaleString();
    document.getElementById('you-amt').textContent = '₱' + state.you.total.toLocaleString();
    document.getElementById('gf-streak').textContent = state.gf.streak + ' day streak';
    document.getElementById('you-streak').textContent = state.you.streak + ' day streak';

    checkMilestone(total);
    updateAnalytics(state);

    const log = document.getElementById('log');
    const allDepositsList = document.getElementById('allDepositsList');
    
    if (!state.history.length) {
      const emptyMsg = '<div class="empty-log">No entries yet — start saving together.</div>';
      log.innerHTML = emptyMsg;
      allDepositsList.innerHTML = emptyMsg;
      return;
    }

    const logHTML = state.history.map(h => {
      const date = new Date(h.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      return `
        <div class="log-item">
          <div class="log-dot ${h.person === 'gf' ? 'me' : ''}"></div>
          <div class="log-who">${h.person === 'gf' ? 'Bebe' : 'Red'}</div>
          <div class="log-time">${date}</div>
          <div class="log-amt">+₱${h.amount}</div>
          <button type="button" class="delete-btn" data-id="${h.id}">✕</button>
        </div>
      `;
    }).join('');
    
    log.innerHTML = logHTML;
    allDepositsList.innerHTML = logHTML;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function setupDeleteButtons() {
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('delete-btn')) {
        e.preventDefault();
        e.stopPropagation();
        const id = e.target.getAttribute('data-id');
        if (id) deleteDeposit(id);
      }
    });
  }

  setupDeleteButtons();

  function toggleAnalytics() {
    document.getElementById('analyticsModal').classList.toggle('show');
  }

  function toggleAllDeposits() {
    document.getElementById('allDepositsModal').classList.toggle('show');
  }

  function updateAnalytics(state) {
    // Monthly breakdown
    const months = {};
    state.history.forEach(h => {
      const monthKey = new Date(h.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
      months[monthKey] = (months[monthKey] || 0) + h.amount;
    });

    let monthlyHTML = '';
    Object.entries(months).reverse().forEach(([month, amount]) => {
      monthlyHTML += `
        <div class="analytics-row">
          <span>${month}</span>
          <span class="analytics-value">₱${amount.toLocaleString()}</span>
        </div>
      `;
    });
    document.getElementById('monthlyBreakdown').innerHTML = monthlyHTML || '<div style="padding: 8px; color: var(--muted);">No data</div>';

    // Actual savings for today/week/month
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weekAgo = new Date(today);
    weekAgo.setDate(weekAgo.getDate() - 7);
    const monthAgo = new Date(today);
    monthAgo.setMonth(monthAgo.getMonth() - 1);

    let savedToday = 0;
    let savedWeek = 0;
    let savedMonth = 0;
    let savedTodayByYou = 0;
    let savedTodayByGf = 0;

    state.history.forEach(h => {
      const hDate = new Date(h.created_at);
      const hDay = new Date(hDate.getFullYear(), hDate.getMonth(), hDate.getDate());
      
      if (hDay.getTime() === today.getTime()) {
        savedToday += h.amount;
        if (h.person === 'gf') savedTodayByGf += h.amount;
        else savedTodayByYou += h.amount;
      }
      if (hDate >= weekAgo) savedWeek += h.amount;
      if (hDate >= monthAgo) savedMonth += h.amount;
    });

    const missedToday = savedTodayByGf === 0 ? '<div style="color: var(--accent); font-size: 0.75rem; margin-top: 8px;">💭 You haven\'t saved today yet</div>' : '';

    document.getElementById('savingsRate').innerHTML = `
      <div class="analytics-row">
        <span>Saved today</span>
        <span class="analytics-value">₱${savedToday.toLocaleString()}</span>
      </div>
      <div class="analytics-row">
        <span>Saved this week</span>
        <span class="analytics-value">₱${savedWeek.toLocaleString()}</span>
      </div>
      <div class="analytics-row">
        <span>Saved this month</span>
        <span class="analytics-value">₱${savedMonth.toLocaleString()}</span>
      </div>
      ${missedToday}
    `;

    // Contribution percentage
    const total = state.you.total + state.gf.total;
    const youPercent = total > 0 ? ((state.you.total / total) * 100).toFixed(1) : 0;
    const gfPercent = total > 0 ? ((state.gf.total / total) * 100).toFixed(1) : 0;

    document.getElementById('contribution').innerHTML = `
      <div class="analytics-row">
        <span>Red</span>
        <span class="analytics-value">${youPercent}%</span>
      </div>
      <div class="analytics-row">
        <span>Bebe</span>
        <span class="analytics-value">${gfPercent}%</span>
      </div>
    `;
  }
</script>
</body>
</html>
